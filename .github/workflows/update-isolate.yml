name: Update isolate-package

# Updates the isolate-package dependency to a new version, bumps the fork's
# pre-release number, and opens a PR to master.
#
# Use this when you've published a pre-release of isolate-package and want to
# test it within the firebase-tools-with-isolate fork.
#
# After the PR is merged, trigger the "Publish" workflow to publish
# the updated version to npm.

on:
  workflow_dispatch:
    inputs:
      isolate_version:
        description: "isolate-package version (e.g. 2.0.0-beta.1, or a dist-tag like 'next')"
        required: true
        type: string
      dry_run:
        description: "Dry run — skip push"
        required: false
        type: boolean
        default: false

jobs:
  update:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve isolate-package version
        id: isolate
        env:
          INPUT_VERSION: ${{ inputs.isolate_version }}
        run: |
          # If the input is a dist-tag (like "next" or "latest"), resolve it
          if [[ "$INPUT_VERSION" =~ ^[a-z]+$ ]]; then
            RESOLVED=$(npm view "isolate-package@$INPUT_VERSION" version)
            echo "Resolved dist-tag '$INPUT_VERSION' → $RESOLVED"
            echo "version=$RESOLVED" >> "$GITHUB_OUTPUT"
          else
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Update dependency
        env:
          ISOLATE_VERSION: ${{ steps.isolate.outputs.version }}
        run: |
          echo "Updating isolate-package to $ISOLATE_VERSION"
          npm pkg set "dependencies.isolate-package=$ISOLATE_VERSION"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Create branch
        env:
          ISOLATE_VERSION: ${{ steps.isolate.outputs.version }}
        run: |
          BRANCH="update-isolate/${ISOLATE_VERSION}"
          git checkout -b "$BRANCH"

      - name: Bump pre-release version
        id: version
        env:
          ISOLATE_VERSION: ${{ steps.isolate.outputs.version }}
        run: |
          # Stage changes from npm pkg set + npm install so npm version
          # doesn't fail on a dirty working directory
          git add package.json npm-shrinkwrap.json
          git commit -m "Update isolate-package to ${ISOLATE_VERSION}"

          # If the version has no prerelease suffix (e.g. after publishing to
          # "latest" which strips it), restore the "-0" suffix first. Without
          # this, npm version prerelease would bump the patch number
          # (15.13.0 → 15.13.1-0) instead of the prerelease (15.13.0 → 15.13.0-0).
          CURRENT=$(node -e "process.stdout.write(require('./package.json').version)")
          if [[ "$CURRENT" != *-* ]]; then
            npm version "${CURRENT}-0" --git-tag-version true
          fi

          npm version prerelease --git-tag-version true

          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          TAG="v${VERSION}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Summary
        env:
          ISOLATE_VERSION: ${{ steps.isolate.outputs.version }}
        run: |
          echo "### Update isolate-package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **isolate-package:** $ISOLATE_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Fork version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run:** ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run the **Publish** workflow with dist-tag \`next\` to publish this version." >> $GITHUB_STEP_SUMMARY

      - name: Push branch
        if: ${{ inputs.dry_run == false }}
        run: |
          BRANCH=$(git branch --show-current)
          git push -u origin "$BRANCH" --force-with-lease

      - name: Create Pull Request
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISOLATE_VERSION: ${{ steps.isolate.outputs.version }}
        run: |
          BRANCH=$(git branch --show-current)

          # Close any existing PR for this branch
          EXISTING=$(gh pr list --base master --head "$BRANCH" --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [[ -n "$EXISTING" ]]; then
            echo "Closing existing PR #$EXISTING"
            gh pr close "$EXISTING" 2>/dev/null || true
          fi

          BODY=$(cat <<EOF
          Update [isolate-package](https://www.npmjs.com/package/isolate-package) to \`${ISOLATE_VERSION}\`.

          **Fork version:** \`${{ steps.version.outputs.version }}\`
          **Tag:** \`${{ steps.version.outputs.tag }}\`

          Run the **Publish** workflow with dist-tag \`next\` to publish this version after merging.

          ---
          _Created by the [update-isolate](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow._
          EOF
          )

          # Use the REST API directly — gh pr create uses GraphQL which can
          # fail with "Resource not accessible by integration" on forks.
          if ! gh api repos/${{ github.repository }}/pulls \
            -f title="Update isolate-package to ${ISOLATE_VERSION}" \
            -f body="$BODY" \
            -f head="$BRANCH" \
            -f base="master" \
            --jq '.html_url'; then
            echo ""
            echo "::warning::Failed to create PR. The branch was pushed successfully."
            echo "Create the PR manually: https://github.com/${{ github.repository }}/compare/master...$BRANCH"
          fi
