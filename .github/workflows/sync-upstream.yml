name: Sync Upstream

# Checks for new upstream firebase-tools releases and creates a sync PR.
#
# Runs daily, or can be triggered manually with an optional target version
# and isolate-package version override. The already-synced check exits
# immediately when there is no new release, so daily polling is cheap.

on:
  schedule:
    # Every day at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      target_version:
        description: "Upstream version to sync to (e.g. v15.13.0). Leave empty for latest."
        required: false
        type: string
      isolate_package_version:
        description: "isolate-package semver range (e.g. ^1.27.0-4). Leave empty for default."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for merge
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/firebase/firebase-tools.git || true
          git fetch upstream --tags --force

      - name: Determine target version
        id: version
        env:
          INPUT_TARGET: ${{ inputs.target_version }}
        run: |
          if [[ -n "$INPUT_TARGET" ]]; then
            echo "tag=$INPUT_TARGET" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if already synced
        id: check
        env:
          TARGET_TAG: ${{ steps.version.outputs.tag }}
        run: |
          VERSION_NUMBER="${TARGET_TAG#v}"
          CURRENT=$(node -e "process.stdout.write(require('./package.json').version)")
          CURRENT_BASE="${CURRENT%%-*}"
          if [[ "$CURRENT_BASE" == "$VERSION_NUMBER" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already synced to $TARGET_TAG"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will sync from $CURRENT to ${VERSION_NUMBER}-0"
          fi
          echo "version_number=$VERSION_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Run sync
        if: steps.check.outputs.skip != 'true'
        env:
          TARGET_TAG: ${{ steps.version.outputs.tag }}
          INPUT_ISOLATE: ${{ inputs.isolate_package_version }}
        run: |
          ARGS=(--no-push)

          [[ -n "$TARGET_TAG" ]] && ARGS+=(--target "$TARGET_TAG")
          [[ -n "$INPUT_ISOLATE" ]] && ARGS+=(--isolate-version "$INPUT_ISOLATE")

          bash scripts/sync/sync-upstream.sh "${ARGS[@]}"

      - name: Push sync branch
        if: steps.check.outputs.skip != 'true'
        run: |
          BRANCH=$(git branch --show-current)
          git push -u origin "$BRANCH" --force

      - name: Create Pull Request
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_TAG: ${{ steps.version.outputs.tag }}
          VERSION_NUMBER: ${{ steps.check.outputs.version_number }}
        run: |
          BRANCH=$(git branch --show-current)

          # Close any existing PR for this sync
          EXISTING=$(gh pr list --base master --head "$BRANCH" --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [[ -n "$EXISTING" ]]; then
            echo "Closing existing PR #$EXISTING"
            gh pr close "$EXISTING" 2>/dev/null || true
          fi

          if ! gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "Sync with upstream $TARGET_TAG" \
            --body "$(cat <<EOF
          Automated sync with upstream [firebase-tools ${TARGET_TAG}](https://github.com/firebase/firebase-tools/releases/tag/${TARGET_TAG}).

          **Fork version:** \`${VERSION_NUMBER}-0\`

          ### What this PR does
          - Merges all changes from firebase-tools \`${TARGET_TAG}\`
          - Re-applies the isolate-package integration on top

          ### Review checklist
          - [ ] Build passes
          - [ ] Isolate integration changes look correct
          - [ ] No unintended file changes

          ---
          _Created by the [sync-upstream](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow._
          EOF
          )"; then
            echo ""
            echo "::warning::Failed to create PR. The branch was pushed successfully."
            echo "Create the PR manually: https://github.com/${{ github.repository }}/compare/master...$BRANCH"
          fi
