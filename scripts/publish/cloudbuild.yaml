steps:
  # Decrypt the SSH key.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    args:
      [
        "gcloud",
        "kms",
        "decrypt",
        "--ciphertext-file=deploy_key.enc",
        "--plaintext-file=/root/.ssh/id_rsa",
        "--location=global",
        "--keyring=${_KEY_RING}",
        "--key=${_KEY_NAME}",
      ]

  # Decrypt the Twitter credentials.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    args:
      [
        "gcloud",
        "kms",
        "decrypt",
        "--ciphertext-file=twitter.json.enc",
        "--plaintext-file=twitter.json",
        "--location=global",
        "--keyring=${_KEY_RING}",
        "--key=${_KEY_NAME}",
      ]

  # Decrypt the npm credentials.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    args:
      [
        "gcloud",
        "kms",
        "decrypt",
        "--ciphertext-file=npmrc.enc",
        "--plaintext-file=npmrc",
        "--location=global",
        "--keyring=${_KEY_RING}",
        "--key=${_KEY_NAME}",
      ]

  # Decrypt the hub (GitHub) credentials.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    args:
      [
        "gcloud",
        "kms",
        "decrypt",
        "--ciphertext-file=hub.enc",
        "--plaintext-file=hub",
        "--location=global",
        "--keyring=${_KEY_RING}",
        "--key=${_KEY_NAME}",
      ]

  # Set up git with key and domain.
  - name: "gcr.io/cloud-builders/git"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        chmod 600 /root/.ssh/id_rsa
        cat <<EOF >/root/.ssh/config
        Hostname github.com
        IdentityFile /root/.ssh/id_rsa
        EOF
        ssh-keyscan github.com >> /root/.ssh/known_hosts

  # Clone the repository.
  - name: "gcr.io/cloud-builders/git"
    args: ["clone", "git@github.com:${_REPOSITORY_ORG}/${_REPOSITORY_NAME}"]

  # Set up the Git configuration.
  - name: "gcr.io/cloud-builders/git"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        git config --global user.name "firebase-release-app[bot]"
        git config --global user.email "$${GH_APP_ID}+firebase-release-app[bot]@users.noreply.github.com"
    secretEnv: ['GH_APP_ID'] # The App ID isn't actually secret.

  # Set up the Twitter credentials.
  - name: "gcr.io/$PROJECT_ID/package-builder"
    entrypoint: "cp"
    args: ["-v", "twitter.json", "${_REPOSITORY_NAME}/scripts/twitter.json"]

  # Set up the npm credentials.
  - name: "gcr.io/$PROJECT_ID/package-builder"
    entrypoint: "bash"
    args: ["-c", "cp -v npmrc ~/.npmrc"]

  # Set up the hub credentials for package-builder.
  - id: "request-github-iat"
    name: "gcr.io/$PROJECT_ID/package-builder"
    entrypoint: "bash"
    secretEnv: ["GH_APP_ID", "GH_APP_INSTALLATION_ID", "GH_APP_PRIVATE_KEY"]
    args:
      - "-c"
      - |
        set -e
        echo "$$GH_APP_PRIVATE_KEY" > /tmp/private-key.pem
        # Build the JWT payload headers and claims
        # iat (Issued At) is set 60 seconds back to prevent clock drift issues
        iat=$$(date +%s -d "1 minute ago")
        exp=$$(($$iat + 600))
        HEADER=$$(echo -n '{"alg":"RS256","typ":"JWT"}' | openssl base64 -e -A | tr -d '=' | tr '/+' '_-')
        PAYLOAD=$$(echo -n "{\"iat\":$$iat,\"exp\":$$exp,\"iss\":\"$$GH_APP_ID\"}" | openssl base64 -e -A | tr -d '=' | tr '/+' '_-')

        # Sign the JWT payload using the App's private key
        HEADER_PAYLOAD="$${HEADER}.$${PAYLOAD}"
        SIGNATURE=$$(echo -n "$$HEADER.$$PAYLOAD" | openssl dgst -sha256 -sign /tmp/private-key.pem | openssl base64 -e -A | tr -d '=' | tr '/+' '_-')
        JWT="$${HEADER_PAYLOAD}.$${SIGNATURE}"

        # Exchange the JWT for an Installation Access Token (IAT)
        RESPONSE=$(curl -s -X POST \
          -H "Authorization: Bearer $${JWT}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2026-03-10" \
          -H "Content-Type: application/json" \
          -d '{ "repositories": ["firebase-tools"] }' \
          "https://api.github.com/app/installations/$$GH_APP_INSTALLATION_ID/access_tokens")

        # Extract the IAT using grep/sed (to avoid requiring a jq dependency)
        IAT=$(echo "$$RESPONSE" | sed -n 's/.*"token": *"\([^"]*\)".*/\1/p')

        if [ -z "$$IAT" ]; then
          echo "Error: Failed to obtain IAT token. Raw response:"
          echo "$$RESPONSE"
          exit 1
        fi

        # Save the token to a shared file for subsequent build steps
        mkdir -vp ~/.config && echo -n "$$IAT" > ~/.config/hub
        echo "Successfully requested and saved GitHub App IAT."

  # Publish the package.
  - name: "gcr.io/$PROJECT_ID/package-builder"
    dir: "${_REPOSITORY_NAME}"
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_VERSION}" == "preview" ]; then
          ./scripts/publish.sh "${_VERSION}" "${_BRANCH}"
        else
          GITHUB_TOKEN=$(cat ~/.config/hub) ./scripts/publish.sh "${_VERSION}"
        fi
    env:
      - "REPOSITORY_ORG=${_REPOSITORY_ORG}"
      - "REPOSITORY_NAME=${_REPOSITORY_NAME}"

  # Wait for package to be available on npm.
  - name: "gcr.io/$PROJECT_ID/package-builder"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "Waiting for firebase-tools@$(cat /workspace/version_number.txt) to be available on npm..."
        timeout=300
        elapsed=0
        interval=15
        until npm install --dry-run "firebase-tools@$(cat /workspace/version_number.txt)" > /dev/null 2>&1; do
          if [ $$elapsed -ge $$timeout ]; then
            echo "Timeout waiting for package."
            exit 1
          fi
          echo "Still waiting..."
          sleep $$interval
          elapsed=$$((elapsed + interval))
        done
        echo "Sleeping for 60 seconds to ensure propagation..." 
        sleep 60
        echo "Package firebase-tools@$(cat /workspace/version_number.txt) is now available on npm."

  # Set up the hub and npm credentials for firepit-builder.
  - name: "gcr.io/$PROJECT_ID/firepit-builder"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_VERSION}" != "preview" ]; then
          mkdir -vp ~/.config && cp -v hub ~/.config/hub
          cp -v npmrc ~/.npmrc
        else
          echo "Skipping credentials for firepit-builder for preview."
        fi

  # Publish the firepit builds.
  - name: "gcr.io/$PROJECT_ID/firepit-builder"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_VERSION}" != "preview" ]; then
          GITHUB_TOKEN=$(cat ~/.config/hub) node /usr/src/app/pipeline.js --package=firebase-tools@$(cat /workspace/version_number.txt) --publish
          echo "Please review the draft release notes at https://github.com/${_REPOSITORY_ORG}/${_REPOSITORY_NAME}/releases. If it looks good, publish it"
        else
          echo "Skipping firepit build for preview version."
        fi

  # Tag the previous version of the docker image
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_VERSION}" != "preview" ]; then
          IMAGE_NAME="us-docker.pkg.dev/${_ARTIFACT_REGISTRY_PROJECT}/us/firebase"
          TAGS=$(gcloud container images list-tags $${IMAGE_NAME} --filter="tags:latest" --format="value(tags)")
          echo "Tags for latest: $${TAGS}"
          PREVIOUS_VERSION=$(echo $${TAGS} | tr ',' '\n' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$$' | head -n 1)
          echo "Detected previous version: $${PREVIOUS_VERSION}"
          if [ -n "$${PREVIOUS_VERSION}" ]; then
            gcloud container images add-tag $${IMAGE_NAME}:latest $${IMAGE_NAME}:no-new-use-public-image-$${PREVIOUS_VERSION} --quiet
          else
            echo "Could not detect previous version tag. Skipping tagging."
          fi
        else
          echo "Skipping for preview version."
        fi

  # Publish the Firebase docker image
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_VERSION}" != "preview" ]; then
          set -e
          VERSION_NUM="$$(cat /workspace/version_number.txt)"
          REPO="us-docker.pkg.dev/${_ARTIFACT_REGISTRY_PROJECT}/us/firebase"
          docker build -t "$${REPO}:$${VERSION_NUM}" -t "$${REPO}:latest" -f ./firebase-docker-image/Dockerfile ./firebase-docker-image
          docker push "$${REPO}:$${VERSION_NUM}"
        else
          echo "Skipping docker build for preview version."
        fi

images:
  - "us-docker.pkg.dev/${_ARTIFACT_REGISTRY_PROJECT}/us/firebase"

timeout: 1200s # 20 minutes

options:
  volumes:
    - name: "ssh"
      path: /root/.ssh

substitutions:
  _VERSION: ""
  _BRANCH: ""
  _KEY_RING: "cloud-build-ring"
  _KEY_NAME: "publish"
  _REPOSITORY_ORG: "firebase"
  _REPOSITORY_NAME: "firebase-tools"
  _ARTIFACT_REGISTRY_PROJECT: "firebase-cli"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GH_APP_ID/versions/latest
      env: "GH_APP_ID"
    - versionName: projects/$PROJECT_ID/secrets/GH_APP_INSTALLATION_ID/versions/latest
      env: "GH_APP_INSTALLATION_ID"
    - versionName: projects/$PROJECT_ID/secrets/GH_APP_PRIVATE_KEY/versions/latest
      env: "GH_APP_PRIVATE_KEY"
