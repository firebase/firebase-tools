steps:
  # Decrypt the SSH key.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    args:
      [
        "gcloud",
        "kms",
        "decrypt",
        "--ciphertext-file=deploy_key.enc",
        "--plaintext-file=/root/.ssh/id_rsa",
        "--location=global",
        "--keyring=${_KEY_RING}",
        "--key=${_KEY_NAME}",
      ]

  # Decrypt the Twitter credentials.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    args:
      [
        "gcloud",
        "kms",
        "decrypt",
        "--ciphertext-file=twitter.json.enc",
        "--plaintext-file=twitter.json",
        "--location=global",
        "--keyring=${_KEY_RING}",
        "--key=${_KEY_NAME}",
      ]

  # Decrypt the npm credentials.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    args:
      [
        "gcloud",
        "kms",
        "decrypt",
        "--ciphertext-file=npmrc.enc",
        "--plaintext-file=npmrc",
        "--location=global",
        "--keyring=${_KEY_RING}",
        "--key=${_KEY_NAME}",
      ]

  # Decrypt the hub (GitHub) credentials.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    args:
      [
        "gcloud",
        "kms",
        "decrypt",
        "--ciphertext-file=hub.enc",
        "--plaintext-file=hub",
        "--location=global",
        "--keyring=${_KEY_RING}",
        "--key=${_KEY_NAME}",
      ]

  # Set up git with key and domain.
  - name: "gcr.io/cloud-builders/git"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        chmod 600 /root/.ssh/id_rsa
        cat <<EOF >/root/.ssh/config
        Hostname github.com
        IdentityFile /root/.ssh/id_rsa
        EOF
        ssh-keyscan github.com >> /root/.ssh/known_hosts

  # Clone the repository.
  - name: "gcr.io/cloud-builders/git"
    args: ["clone", "git@github.com:${_REPOSITORY_ORG}/${_REPOSITORY_NAME}"]

  # Set up the Git configuration.
  - name: "gcr.io/cloud-builders/git"
    dir: "${_REPOSITORY_NAME}"
    args: ["config", "--global", "user.email", "firebase-oss-bot@google.com"]
  - name: "gcr.io/cloud-builders/git"
    dir: "${_REPOSITORY_NAME}"
    args: ["config", "--global", "user.name", "Google Open Source Bot"]

  # Set up the Twitter credentials.
  - name: "gcr.io/$PROJECT_ID/package-builder"
    entrypoint: "cp"
    args: ["-v", "twitter.json", "${_REPOSITORY_NAME}/scripts/twitter.json"]

  # Set up the npm credentials.
  - name: "gcr.io/$PROJECT_ID/package-builder"
    entrypoint: "bash"
    args: ["-c", "cp -v npmrc ~/.npmrc"]

  # Set up the hub credentials for package-builder.
  - name: "gcr.io/$PROJECT_ID/package-builder"
    entrypoint: "bash"
    args: ["-c", "mkdir -vp ~/.config && cp -v hub ~/.config/hub"]

  # Publish the package.
  - name: "gcr.io/$PROJECT_ID/package-builder"
    dir: "${_REPOSITORY_NAME}"
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_VERSION}" == "preview" ]; then
          ./scripts/publish.sh "${_VERSION}" "${_BRANCH}"
        else
          GITHUB_TOKEN=$(cat ~/.config/hub) ./scripts/publish.sh "${_VERSION}"
        fi
    env:
      - "REPOSITORY_ORG=${_REPOSITORY_ORG}"
      - "REPOSITORY_NAME=${_REPOSITORY_NAME}"

  # Wait for package to be available on npm.
  - name: "gcr.io/$PROJECT_ID/package-builder"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "Waiting for firebase-tools@$(cat /workspace/version_number.txt) to be available on npm..."
        timeout=300
        elapsed=0
        interval=15
        until npm view "firebase-tools@$(cat /workspace/version_number.txt)" > /dev/null 2>&1; do
          if [ $$elapsed -ge $$timeout ]; then
            echo "Timeout waiting for package."
            exit 1
          fi
          echo "Still waiting..."
          sleep $$interval
          elapsed=$$((elapsed + interval))
        done
        echo "Package firebase-tools@$(cat /workspace/version_number.txt) is now available on npm."

  # Set up the hub credentials for firepit-builder.
  - name: "gcr.io/$PROJECT_ID/firepit-builder"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_VERSION}" != "preview" ]; then
          mkdir -vp ~/.config && cp -v hub ~/.config/hub
        else
          echo "Skipping hub credentials for firepit-builder for preview."
        fi

  # Publish the firepit builds.
  - name: "gcr.io/$PROJECT_ID/firepit-builder"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_VERSION}" != "preview" ]; then
          GITHUB_TOKEN=$(cat ~/.config/hub) node /usr/src/app/pipeline.js --package=firebase-tools@$(cat /workspace/version_number.txt) --publish
          echo "Please review the draft release notes at https://github.com/${_REPOSITORY_ORG}/${_REPOSITORY_NAME}/releases. If it looks good, publish it"
        else
          echo "Skipping firepit build for preview version."
        fi

  # Publish the Firebase docker image
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_VERSION}" != "preview" ]; then
          docker build -t us-docker.pkg.dev/${_ARTIFACT_REGISTRY_PROJECT}/us/firebase:$(cat /workspace/version_number.txt) -t us-docker.pkg.dev/${_ARTIFACT_REGISTRY_PROJECT}/us/firebase:latest -f ./firebase-docker-image/Dockerfile ./firebase-docker-image
        else
          echo "Skipping docker build for preview version."
        fi

images:
  - "us-docker.pkg.dev/${_ARTIFACT_REGISTRY_PROJECT}/us/firebase"

timeout: 1200s # 20 minutes

options:
  volumes:
    - name: "ssh"
      path: /root/.ssh

substitutions:
  _VERSION: ""
  _BRANCH: ""
  _KEY_RING: "cloud-build-ring"
  _KEY_NAME: "publish"
  _REPOSITORY_ORG: "firebase"
  _REPOSITORY_NAME: "firebase-tools"
  _ARTIFACT_REGISTRY_PROJECT: "firebase-cli"
