steps:
  # Grab the latest version, store in workspace
  - id: "Read New Version Number from npm"
    name: "node"
    entrypoint: "sh"
    args:
      [
        "-c",
        "npm view firebase-tools version > /workspace/version_number.txt && cat /workspace/version_number.txt",
      ]
  # Publish the Firebase docker image
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "sh"
    args:
      - "-c"
      - "docker build -t us-docker.pkg.dev/${_TARGET_PROJECT_ID}/${_REPO_NAME}/firebase:$(cat /workspace/version_number.txt) -t us-docker.pkg.dev/${_TARGET_PROJECT_ID}/${_REPO_NAME}/firebase:latest -t us-docker.pkg.dev/${_TARGET_PROJECT_ID}/${_REPO_NAME}/firebase:public-image-$(cat /workspace/version_number.txt) -f ./Dockerfile ."

images:
  - "us-docker.pkg.dev/${_TARGET_PROJECT_ID}/${_REPO_NAME}/firebase"

substitutions:
  _REPO_NAME: us
  _TARGET_PROJECT_ID: firebase-cli
