steps:
  # Grab the latest version, store in workspace
  - id: "Read New Version Number from npm"
    name: "node"
    entrypoint: "sh"
    args:
      [
        "-c",
        "npm view firebase-tools version > /workspace/version_number.txt && cat /workspace/version_number.txt",
      ]
  # Publish the Firebase docker image
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        set -e
        VERSION_NUM="$$(cat /workspace/version_number.txt)"
        REPO="us-docker.pkg.dev/${_TARGET_PROJECT_ID}/${_REPO_NAME}/firebase"
        if [ "${_REPO_NAME}" = "staging" ]; then
          RANDOM_HASH="$$(tr -dc 'a-f0-9' < /dev/urandom | head -c 16)"
          EXTRA_TAG="no-new-use-public-image-$${RANDOM_HASH}"
        else
          EXTRA_TAG="public-image-$${VERSION_NUM}"
        fi
        docker build \
          -t "$${REPO}:$${VERSION_NUM}" \
          -t "$${REPO}:latest" \
          -t "$${REPO}:$${EXTRA_TAG}" \
          -f ./Dockerfile .
        docker push "$${REPO}:$${VERSION_NUM}"
        docker push "$${REPO}:$${EXTRA_TAG}"

images:
  - "us-docker.pkg.dev/${_TARGET_PROJECT_ID}/${_REPO_NAME}/firebase"

substitutions:
  _REPO_NAME: us
  _TARGET_PROJECT_ID: firebase-cli
